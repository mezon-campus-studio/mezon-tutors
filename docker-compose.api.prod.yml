services:
  postgres:
    image: postgres:17
    restart: always
    env_file:
      - .env.production
    environment:
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-6543}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: mezon-tutors-api:latest
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: always
    expose:
      - "4000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.production
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    restart: always
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx-mezonly.com.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro

  nginx-bootstrap:
    image: nginx:1.27-alpine
    profiles:
      - bootstrap
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx-mezonly.com.phase1-http.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-www:/var/www/certbot:ro

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-www:/var/www/certbot

volumes:
  pgdata:
  certbot-etc:
  certbot-www:
