# Reverse proxy: gw.mezonly.site -> gw.mezon.ai
#
# Why this exists: the mezon-light-sdk authenticates from the browser against
# gw.mezon.ai, which does NOT return an Access-Control-Allow-Origin header for the
# *.mezonly.site origins, so the browser blocks the request (CORS). We cannot change
# gw.mezon.ai, so we proxy it through a host we control and inject the CORS headers here.
# The frontend points NEXT_PUBLIC_MEZON_GATEWAY_URL at https://gw.mezonly.site.
# See docs/mezon-gateway-cors.md for the full runbook.

# Echo back the request Origin only when it is in our allowlist; empty (blocked) otherwise.
map $http_origin $gw_cors_origin {
    default                            "";
    "https://mezonly.site"             $http_origin;
    "https://www.mezonly.site"         $http_origin;
    "https://mezon-tutors.vercel.app"  $http_origin;
    "http://localhost:3000"            $http_origin;
}

# Standard WebSocket upgrade switch (ws_url uses this).
map $http_upgrade $gw_connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name gw.mezonly.site;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name gw.mezonly.site;

    ssl_certificate     /etc/letsencrypt/live/gw.mezonly.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gw.mezonly.site/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    client_max_body_size 25m;

    location / {
        # --- CORS preflight, answered by this proxy (gw.mezon.ai omits ACAO) ---
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin      $gw_cors_origin always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-Requested-With, Cache-Control, Range" always;
            add_header Access-Control-Max-Age           86400 always;
            add_header Content-Type                     "text/plain; charset=utf-8" always;
            add_header Content-Length                   0 always;
            return 204;
        }

        # --- CORS for actual responses (always: also on 4xx/5xx from upstream) ---
        add_header Access-Control-Allow-Origin      $gw_cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Expose-Headers    "Content-Length, Content-Range" always;

        # Drop the upstream's own CORS headers so we don't emit conflicting duplicates.
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Expose-Headers;

        # --- Reverse proxy to the real Mezon gateway ---
        proxy_pass https://gw.mezon.ai;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;                 # send SNI = gw.mezon.ai
        proxy_set_header Host              gw.mezon.ai;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket (ws_url) support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $gw_connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # Rewrite the gateway host inside JSON responses so the api_url / ws_url returned by
        # /v2/account/authenticate/idtoken point back to THIS proxy — otherwise post-login
        # calls (e.g. createDM) and the socket would hit gw.mezon.ai directly and fail CORS.
        # Disabling upstream compression is required for sub_filter to see the body.
        #
        # ASSUMPTION: the gateway returns api_url/ws_url on the gw.mezon.ai host. If a real
        # login shows a different host in sessionStorage["mezon-light-session"], add another
        # sub_filter line for it AND make sure that host is also proxied through here.
        proxy_set_header Accept-Encoding "";
        sub_filter "gw.mezon.ai" "gw.mezonly.site";
        sub_filter_once off;
        sub_filter_types application/json;
    }
}
