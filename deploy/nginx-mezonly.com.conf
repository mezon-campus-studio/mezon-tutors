map $http_origin $mezonly_cors_origin {
    default                            "";
    "https://mezonly.com"             $http_origin;
    "https://www.mezonly.com"         $http_origin;
    "https://mezon-tutors.vercel.app"  $http_origin;
    "http://localhost:3000"            $http_origin;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.mezonly.com gw.mezonly.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.mezonly.com;

    ssl_certificate /etc/letsencrypt/live/api.mezonly.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.mezonly.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 25m;

    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
    large_client_header_buffers 4 32k;

    location / {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin      $mezonly_cors_origin always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-Requested-With, Cache-Control, Range, X-CSRF-Token" always;
            add_header Access-Control-Max-Age           86400 always;
            add_header Vary                             "Origin" always;
            add_header Content-Type                     "text/plain; charset=utf-8" always;
            add_header Content-Length                   0 always;
            return 204;
        }

        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Expose-Headers;

        add_header Access-Control-Allow-Origin      $mezonly_cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Vary                             "Origin" always;
        add_header Cache-Control                    "no-store" always;

        proxy_pass http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name gw.mezonly.com;

    ssl_certificate /etc/letsencrypt/live/gw.mezonly.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gw.mezonly.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 25m;

    location / {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin      $mezonly_cors_origin always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-Requested-With, Cache-Control, Range" always;
            add_header Access-Control-Max-Age           86400 always;
            add_header Vary                             "Origin" always;
            add_header Content-Type                     "text/plain; charset=utf-8" always;
            add_header Content-Length                   0 always;
            return 204;
        }

        add_header Access-Control-Allow-Origin      $mezonly_cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Expose-Headers    "Content-Length, Content-Range" always;
        add_header Vary                             "Origin" always;

        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Expose-Headers;

        proxy_pass https://gw.mezon.ai;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host gw.mezon.ai;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        proxy_set_header Accept-Encoding "";
        sub_filter "gw.mezon.ai" "gw.mezonly.com";
        sub_filter_once off;
        sub_filter_types application/json;
    }
}
