# Temporary HTTP-only config for gw.mezonly.site.
# Use this first so certbot (webroot) can issue the TLS cert, then swap in
# nginx-gw.mezonly.site.conf. See docs/mezon-gateway-cors.md.
server {
    listen 80;
    listen [::]:80;
    server_name gw.mezonly.site;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 404;
    }
}
